<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=375, initial-scale=1.0" />
  <title>로그인</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen">
  <div class="w-[375px] min-h-[812px] bg-white flex flex-col relative overflow-hidden">

    <!-- 상단 배경 -->
    <div class="bg-indigo-600 h-52 w-full absolute top-0 left-0 rounded-b-[40px]"></div>

    <!-- 로고 영역 -->
    <div class="relative z-10 flex flex-col items-center pt-14 pb-6">
      <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center shadow-lg mb-3">
        <span class="text-3xl">📐</span>
      </div>
      <h1 class="text-white text-2xl font-bold tracking-tight">수학 쇼츠</h1>
      <p class="text-indigo-200 text-sm mt-1">중학교 2학년 수학 학습</p>
    </div>

    <!-- 로그인 카드 -->
    <div class="relative z-10 mx-4 bg-white rounded-2xl shadow-xl p-6 mt-2">
      <h2 class="text-slate-800 text-lg font-bold mb-5">학생 로그인</h2>

      <div class="space-y-4">
        <!-- 학교명 -->
        <div>
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide">학교명</label>
          <div class="mt-1 flex items-center border border-slate-200 rounded-xl px-4 py-3 bg-slate-50">
            <span class="text-slate-400 mr-2">🏫</span>
            <span class="text-slate-400 text-sm">학교명을 입력하세요</span>
          </div>
        </div>

        <!-- 학년 -->
        <div>
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide">학년</label>
          <div class="mt-1 flex items-center justify-between border border-slate-200 rounded-xl px-4 py-3 bg-slate-50">
            <div class="flex items-center">
              <span class="text-slate-400 mr-2">📚</span>
              <span class="text-slate-800 text-sm font-medium">2학년</span>
            </div>
            <span class="text-slate-400 text-xs">▼</span>
          </div>
        </div>

        <!-- 이름 -->
        <div>
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide">이름</label>
          <div class="mt-1 flex items-center border border-slate-200 rounded-xl px-4 py-3 bg-slate-50">
            <span class="text-slate-400 mr-2">👤</span>
            <span class="text-slate-400 text-sm">이름을 입력하세요</span>
          </div>
        </div>
      </div>

      <!-- 로그인 버튼 -->
      <button class="mt-6 w-full bg-indigo-600 text-white font-bold py-4 rounded-xl text-base shadow-md shadow-indigo-200">
        로그인
      </button>

      <!-- 관리자 링크 -->
      <div class="mt-4 text-center">
        <span class="text-slate-400 text-sm">관리자이신가요? </span>
        <span class="text-indigo-600 text-sm font-semibold">관리자 로그인 →</span>
      </div>
    </div>

    <!-- 안내 문구 -->
    <div class="relative z-10 mx-4 mt-4 bg-indigo-50 rounded-xl px-4 py-3 flex items-start gap-2">
      <span class="text-indigo-400 mt-0.5">ℹ️</span>
      <p class="text-indigo-700 text-xs leading-relaxed">선생님께 받은 학교명과 이름으로 로그인하세요. 계정 문의는 담당 선생님께 해주세요.</p>
    </div>

  </div>
</body>
</html>
