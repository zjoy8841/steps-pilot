<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=375, initial-scale=1.0" />
  <title>관리자 - 영상 등록</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen">
  <div class="w-[375px] min-h-[812px] bg-slate-50 flex flex-col relative overflow-hidden">

    <!-- 헤더 -->
    <div class="bg-slate-900 px-5 pt-12 pb-4">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-xs text-slate-400">관리자 모드</p>
          <h1 class="text-white text-lg font-bold">영상 등록</h1>
        </div>
        <span class="text-xs text-amber-400 bg-amber-400/10 border border-amber-400/20 px-2 py-1 rounded-full font-medium">ADMIN</span>
      </div>
    </div>

    <!-- 탭 -->
    <div class="bg-white px-5 flex gap-4 border-b border-slate-100">
      <button class="py-3 text-sm font-medium text-slate-400">영상 목록</button>
      <button class="py-3 text-sm font-bold text-indigo-600 border-b-2 border-indigo-600">영상 등록</button>
      <button class="py-3 text-sm font-medium text-slate-400">성취기준 관리</button>
    </div>

    <!-- 폼 -->
    <div class="flex-1 overflow-y-auto px-4 pt-5 pb-6 space-y-4">

      <!-- YouTube URL -->
      <div class="bg-white rounded-2xl p-4 shadow-sm">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-wide">YouTube URL</label>
        <div class="mt-2 flex items-center border border-slate-200 rounded-xl px-3 py-3 bg-slate-50 gap-2">
          <span class="text-red-500">▶</span>
          <span class="text-slate-400 text-sm">https://youtube.com/shorts/...</span>
        </div>
        <!-- URL 미리보기 -->
        <div class="mt-3 bg-indigo-50 rounded-xl overflow-hidden">
          <div class="w-full h-28 bg-indigo-200 flex items-center justify-center">
            <div class="text-center">
              <span class="text-indigo-600 text-3xl">▶</span>
              <p class="text-indigo-500 text-xs mt-1">URL 입력 후 미리보기</p>
            </div>
          </div>
        </div>
      </div>

      <!-- 영상 제목 -->
      <div class="bg-white rounded-2xl p-4 shadow-sm">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-wide">영상 제목</label>
        <div class="mt-2 border border-slate-200 rounded-xl px-3 py-3 bg-slate-50">
          <span class="text-slate-400 text-sm">예: 1강. 단항식의 곱셈과 나눗셈</span>
        </div>
      </div>

      <!-- 성취기준 태깅 -->
      <div class="bg-white rounded-2xl p-4 shadow-sm">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-wide">성취기준 태깅</label>
        <p class="text-xs text-slate-400 mt-0.5 mb-3">해당하는 성취기준을 모두 선택하세요</p>

        <div class="space-y-2">

          <!-- 선택됨 -->
          <div class="flex items-center gap-3 p-3 bg-indigo-50 border border-indigo-200 rounded-xl">
            <div class="w-5 h-5 bg-indigo-600 rounded-md flex items-center justify-center flex-shrink-0">
              <span class="text-white text-xs">✓</span>
            </div>
            <div class="flex-1">
              <p class="text-sm font-semibold text-indigo-800">단항식의 계산</p>
              <p class="text-xs text-indigo-500">수학-중2-02</p>
            </div>
          </div>

          <!-- 미선택 -->
          <div class="flex items-center gap-3 p-3 bg-slate-50 border border-slate-200 rounded-xl">
            <div class="w-5 h-5 bg-white border-2 border-slate-300 rounded-md flex-shrink-0"></div>
            <div class="flex-1">
              <p class="text-sm font-semibold text-slate-700">유리수와 순환소수</p>
              <p class="text-xs text-slate-400">수학-중2-01</p>
            </div>
          </div>

          <div class="flex items-center gap-3 p-3 bg-slate-50 border border-slate-200 rounded-xl">
            <div class="w-5 h-5 bg-white border-2 border-slate-300 rounded-md flex-shrink-0"></div>
            <div class="flex-1">
              <p class="text-sm font-semibold text-slate-700">다항식의 계산</p>
              <p class="text-xs text-slate-400">수학-중2-03</p>
            </div>
          </div>

          <div class="flex items-center gap-3 p-3 bg-slate-50 border border-slate-200 rounded-xl">
            <div class="w-5 h-5 bg-white border-2 border-slate-300 rounded-md flex-shrink-0"></div>
            <div class="flex-1">
              <p class="text-sm font-semibold text-slate-700">연립방정식</p>
              <p class="text-xs text-slate-400">수학-중2-04</p>
            </div>
          </div>

        </div>
      </div>

      <!-- 등록 버튼 -->
      <button class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl text-base shadow-md shadow-indigo-200 flex items-center justify-center gap-2">
        <span>+</span> 영상 등록하기
      </button>

      <button class="w-full bg-white text-slate-500 font-medium py-3.5 rounded-xl text-sm border border-slate-200">
        취소
      </button>

    </div>

  </div>
</body>
</html>
