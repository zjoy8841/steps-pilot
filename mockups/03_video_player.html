<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=375, initial-scale=1.0" />
  <title>쇼츠 시청</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen">
  <div class="w-[375px] min-h-[812px] bg-black flex flex-col relative overflow-hidden">

    <!-- 상단 헤더 (영상 위 오버레이) -->
    <div class="absolute top-0 left-0 right-0 z-20 px-4 pt-12 pb-4 bg-gradient-to-b from-black/60 to-transparent">
      <div class="flex items-center gap-3">
        <button class="text-white text-xl">‹</button>
        <div class="flex-1">
          <p class="text-white/60 text-xs">단항식의 계산</p>
          <p class="text-white text-sm font-semibold">1강. 단항식의 곱셈과 나눗셈</p>
        </div>
        <button class="text-white/60 text-xl">⋮</button>
      </div>
    </div>

    <!-- 영상 영역 (9:16 비율) -->
    <div class="w-full" style="aspect-ratio: 9/16; max-height: 560px; background: #1a1a2e;">
      <!-- YouTube 썸네일 시뮬레이션 -->
      <div class="w-full h-full flex flex-col items-center justify-center relative">
        <div class="absolute inset-0 bg-gradient-to-br from-indigo-900 to-slate-900 opacity-80"></div>

        <!-- 수식 배경 장식 -->
        <div class="absolute inset-0 flex items-center justify-center opacity-10">
          <span class="text-white text-8xl font-bold">ax·bx</span>
        </div>

        <!-- 재생 버튼 -->
        <div class="relative z-10 w-16 h-16 bg-white/20 backdrop-blur rounded-full flex items-center justify-center border-2 border-white/40">
          <span class="text-white text-2xl ml-1">▶</span>
        </div>
        <p class="relative z-10 text-white/60 text-xs mt-3">YouTube 영상이 재생됩니다</p>

        <!-- 진행 바 -->
        <div class="absolute bottom-0 left-0 right-0 px-4 pb-3">
          <div class="bg-white/20 rounded-full h-1 mb-2">
            <div class="bg-white h-1 rounded-full w-[40%]"></div>
          </div>
          <div class="flex justify-between text-white/60 text-xs">
            <span>1:23</span>
            <span>3:45</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 하단 정보 패널 -->
    <div class="flex-1 bg-white rounded-t-3xl -mt-4 relative z-10 px-5 pt-5 pb-6 flex flex-col">

      <!-- 성취기준 태그 -->
      <div class="flex gap-2 flex-wrap mb-3">
        <span class="bg-indigo-100 text-indigo-700 text-xs font-semibold px-3 py-1 rounded-full">수학-중2-02</span>
        <span class="bg-violet-100 text-violet-700 text-xs font-semibold px-3 py-1 rounded-full">단항식의 계산</span>
      </div>

      <!-- 영상 제목 -->
      <h2 class="text-slate-800 text-base font-bold leading-snug">1강. 단항식의 곱셈과 나눗셈 — 기본 개념 정리</h2>

      <!-- 시청 완료율 -->
      <div class="mt-3 flex items-center gap-3">
        <div class="flex-1 bg-slate-100 rounded-full h-2">
          <div class="bg-indigo-500 h-2 rounded-full w-[40%]"></div>
        </div>
        <span class="text-xs text-slate-500 font-medium">40% 시청</span>
      </div>

      <!-- 관련 영상 목록 -->
      <div class="mt-4">
        <p class="text-xs font-bold text-slate-500 uppercase tracking-wide mb-2">같은 성취기준 영상</p>
        <div class="space-y-2">

          <div class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl">
            <div class="w-14 h-10 bg-indigo-200 rounded-lg flex items-center justify-center flex-shrink-0">
              <span class="text-indigo-700 text-lg">▶</span>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-semibold text-slate-700 truncate">2강. 단항식의 나눗셈 심화</p>
              <p class="text-xs text-slate-400 mt-0.5">3분 20초</p>
            </div>
            <span class="text-xs text-slate-300 bg-slate-100 px-2 py-1 rounded-full">미시청</span>
          </div>

          <div class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl">
            <div class="w-14 h-10 bg-emerald-100 rounded-lg flex items-center justify-center flex-shrink-0">
              <span class="text-emerald-600 text-lg">✓</span>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-semibold text-slate-400 truncate">3강. 실전 문제 풀이</p>
              <p class="text-xs text-slate-300 mt-0.5">4분 10초</p>
            </div>
            <span class="text-xs text-emerald-600 bg-emerald-50 px-2 py-1 rounded-full">완료</span>
          </div>

        </div>
      </div>

      <!-- 완료 버튼 -->
      <div class="mt-auto pt-4">
        <button class="w-full bg-emerald-500 text-white font-bold py-4 rounded-xl text-base shadow-md shadow-emerald-200 flex items-center justify-center gap-2">
          <span>✓</span> 학습 완료로 표시
        </button>
      </div>

    </div>

  </div>
</body>
</html>
