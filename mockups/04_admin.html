<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=375, initial-scale=1.0" />
  <title>관리자 화면</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen">
  <div class="w-[375px] min-h-[812px] bg-slate-50 flex flex-col relative overflow-hidden">

    <!-- 헤더 -->
    <div class="bg-slate-900 px-5 pt-12 pb-4">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-xs text-slate-400">관리자 모드</p>
          <h1 class="text-white text-lg font-bold">영상 관리</h1>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-xs text-amber-400 bg-amber-400/10 border border-amber-400/20 px-2 py-1 rounded-full font-medium">ADMIN</span>
        </div>
      </div>

      <!-- 통계 요약 -->
      <div class="mt-4 grid grid-cols-3 gap-2">
        <div class="bg-white/10 rounded-xl p-3 text-center">
          <p class="text-white font-bold text-xl">12</p>
          <p class="text-slate-400 text-xs mt-0.5">전체 영상</p>
        </div>
        <div class="bg-white/10 rounded-xl p-3 text-center">
          <p class="text-amber-400 font-bold text-xl">8</p>
          <p class="text-slate-400 text-xs mt-0.5">성취기준</p>
        </div>
        <div class="bg-white/10 rounded-xl p-3 text-center">
          <p class="text-emerald-400 font-bold text-xl">24</p>
          <p class="text-slate-400 text-xs mt-0.5">학생 수</p>
        </div>
      </div>
    </div>

    <!-- 탭 -->
    <div class="bg-white px-5 flex gap-4 border-b border-slate-100">
      <button class="py-3 text-sm font-bold text-indigo-600 border-b-2 border-indigo-600">영상 목록</button>
      <button class="py-3 text-sm font-medium text-slate-400">영상 등록</button>
      <button class="py-3 text-sm font-medium text-slate-400">성취기준 관리</button>
    </div>

    <!-- 영상 목록 -->
    <div class="flex-1 overflow-y-auto px-4 pt-4 pb-6">

      <!-- 검색 + 등록 버튼 -->
      <div class="flex gap-2 mb-4">
        <div class="flex-1 flex items-center bg-white border border-slate-200 rounded-xl px-3 py-2.5 gap-2">
          <span class="text-slate-400">🔍</span>
          <span class="text-slate-400 text-sm">영상 검색</span>
        </div>
        <button class="bg-indigo-600 text-white text-sm font-bold px-4 rounded-xl shadow-sm shadow-indigo-200">
          + 등록
        </button>
      </div>

      <!-- 영상 카드들 -->
      <div class="space-y-3">

        <div class="bg-white rounded-2xl p-4 shadow-sm">
          <div class="flex items-start gap-3">
            <div class="w-14 h-14 bg-indigo-100 rounded-xl flex items-center justify-center flex-shrink-0">
              <span class="text-2xl">▶</span>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-bold text-slate-800 leading-snug">1강. 단항식의 곱셈과 나눗셈</p>
              <div class="flex items-center gap-1.5 mt-1.5 flex-wrap">
                <span class="text-xs bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-full">수학-중2-02</span>
              </div>
              <p class="text-xs text-slate-400 mt-1.5">시청 완료: 18명 / 24명</p>
            </div>
            <div class="flex flex-col gap-1.5 ml-1">
              <button class="text-xs text-slate-500 bg-slate-100 px-2.5 py-1.5 rounded-lg font-medium">수정</button>
              <button class="text-xs text-red-500 bg-red-50 px-2.5 py-1.5 rounded-lg font-medium">삭제</button>
            </div>
          </div>
          <div class="mt-3 bg-slate-50 rounded-lg px-3 py-2 flex items-center gap-2">
            <span class="text-slate-400 text-xs">🔗</span>
            <span class="text-slate-500 text-xs font-mono truncate">youtube.com/shorts/abc123</span>
          </div>
        </div>

        <div class="bg-white rounded-2xl p-4 shadow-sm">
          <div class="flex items-start gap-3">
            <div class="w-14 h-14 bg-violet-100 rounded-xl flex items-center justify-center flex-shrink-0">
              <span class="text-2xl">▶</span>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-bold text-slate-800 leading-snug">연립방정식 풀이 핵심 정리</p>
              <div class="flex items-center gap-1.5 mt-1.5 flex-wrap">
                <span class="text-xs bg-violet-50 text-violet-600 px-2 py-0.5 rounded-full">수학-중2-04</span>
              </div>
              <p class="text-xs text-slate-400 mt-1.5">시청 완료: 5명 / 24명</p>
            </div>
            <div class="flex flex-col gap-1.5 ml-1">
              <button class="text-xs text-slate-500 bg-slate-100 px-2.5 py-1.5 rounded-lg font-medium">수정</button>
              <button class="text-xs text-red-500 bg-red-50 px-2.5 py-1.5 rounded-lg font-medium">삭제</button>
            </div>
          </div>
          <div class="mt-3 bg-slate-50 rounded-lg px-3 py-2 flex items-center gap-2">
            <span class="text-slate-400 text-xs">🔗</span>
            <span class="text-slate-500 text-xs font-mono truncate">youtube.com/shorts/xyz789</span>
          </div>
        </div>

        <div class="bg-white rounded-2xl p-4 shadow-sm">
          <div class="flex items-start gap-3">
            <div class="w-14 h-14 bg-emerald-100 rounded-xl flex items-center justify-center flex-shrink-0">
              <span class="text-2xl">▶</span>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-bold text-slate-800 leading-snug">유리수 순환소수 변환 방법</p>
              <div class="flex items-center gap-1.5 mt-1.5 flex-wrap">
                <span class="text-xs bg-emerald-50 text-emerald-600 px-2 py-0.5 rounded-full">수학-중2-01</span>
              </div>
              <p class="text-xs text-slate-400 mt-1.5">시청 완료: 22명 / 24명</p>
            </div>
            <div class="flex flex-col gap-1.5 ml-1">
              <button class="text-xs text-slate-500 bg-slate-100 px-2.5 py-1.5 rounded-lg font-medium">수정</button>
              <button class="text-xs text-red-500 bg-red-50 px-2.5 py-1.5 rounded-lg font-medium">삭제</button>
            </div>
          </div>
          <div class="mt-3 bg-slate-50 rounded-lg px-3 py-2 flex items-center gap-2">
            <span class="text-slate-400 text-xs">🔗</span>
            <span class="text-slate-500 text-xs font-mono truncate">youtube.com/shorts/def456</span>
          </div>
        </div>

      </div>
    </div>

  </div>
</body>
</html>
